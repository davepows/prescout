<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6328 PreScout — Mechanical Advantage</title>
  <!-- Barlow Condensed = closest Google Fonts match to Alternate Gothic (6328 primary font) -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      /* 6328 Mechanical Advantage brand palette */
      --gold: #F5A623;
      --gold-dark: #D4881A;
      --gold-light: rgba(245,166,35,0.15);
      --royal: #3D5BA9;       /* 6328 royal blue */
      --navy: #1A2744;        /* 6328 dark navy (gears) */
      --bg: #0e1726;          /* deep dark base */
      --surface: #141f38;
      --card: #1a2d52;
      --card-hover: #1e3a70;
      --border: rgba(255,255,255,0.08);
      --text: #F4F4EE;
      --muted: rgba(244,244,238,0.45);
      --green: #22c55e;
      --green-dim: #166534;
      --red: #ef4444;
      --red-dim: #7f1d1d;
      --blue-acc: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      font-family: 'Barlow', 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    #app-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--navy);
      border-bottom: 3px solid var(--gold);
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      display: flex; align-items: center;
      padding: 0 20px; height: 64px; gap: 14px;
    }
    .header-brand {
      display: flex; align-items: center; gap: 12px;
      white-space: nowrap; flex-shrink: 0;
    }
    .header-brand-text {
      display: flex; flex-direction: column; line-height: 1.1;
    }
    .header-brand-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 22px; letter-spacing: 0.04em;
      color: var(--gold); text-transform: uppercase;
    }
    .header-brand-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600; font-size: 11px; letter-spacing: 0.12em;
      color: rgba(244,244,238,0.55); text-transform: uppercase;
    }
    .header-divider {
      width: 1px; height: 32px; background: rgba(255,255,255,0.15); flex-shrink: 0;
    }
    .header-tool-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 16px; letter-spacing: 0.1em;
      color: var(--text); text-transform: uppercase; flex-shrink: 0;
    }
    .header-spacer { flex: 1; }
    .header-event-badge {
      background: rgba(239,171,40,0.12); border: 1px solid rgba(239,171,40,0.3);
      color: var(--gold); font-size: 13px; font-weight: 700;
      padding: 5px 12px; border-radius: 8px; letter-spacing: 0.05em;
      text-transform: uppercase; white-space: nowrap;
    }
    .header-btn {
      background: var(--gold); color: #0f1729;
      border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 13px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
      font-family: inherit; transition: background 0.15s;
      white-space: nowrap;
    }
    .header-btn:hover { background: var(--gold-dark); }
    .header-btn.outline {
      background: transparent; color: var(--gold);
      border: 1.5px solid rgba(239,171,40,0.4);
    }
    .header-btn.outline:hover { background: rgba(239,171,40,0.1); }

    /* ── SETUP SCREEN ── */
    #setup-screen {
      max-width: 520px; margin: 80px auto; padding: 0 24px;
    }
    .setup-card {
      background: var(--card); border-radius: 20px;
      padding: 36px; border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .setup-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 42px; font-weight: 800; letter-spacing: 0.06em;
      color: var(--gold); text-transform: uppercase;
      margin-bottom: 2px; display: flex; align-items: center; gap: 14px;
    }
    .setup-logo-num { color: var(--gold); }
    .setup-logo-sep { width: 100%; height: 3px; background: var(--gold); margin: 6px 0 4px; border-radius: 2px; }
    .setup-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; color: rgba(244,244,238,0.6); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 13px 15px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.3); color: var(--text);
      font-size: 15px; font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-input:focus {
      outline: none; border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(239,171,40,0.2);
    }
    .form-input::placeholder { color: rgba(244,244,238,0.3); }
    .form-hint {
      font-size: 12px; color: var(--muted); margin-top: 6px;
    }
    .btn-primary {
      width: 100%; padding: 15px; background: var(--gold);
      color: #0f1729; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      font-family: inherit; letter-spacing: 0.05em;
      text-transform: uppercase; transition: background 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--gold-dark); }
    .btn-primary:disabled {
      opacity: 0.4; cursor: not-allowed; background: var(--gold);
    }
    .data-sources {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .data-source-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; font-size: 13px; color: var(--muted);
    }
    .data-source-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── LOADING SCREEN ── */
    #loading-screen {
      max-width: 480px; margin: 100px auto; padding: 0 24px;
      text-align: center;
    }
    .loading-title {
      font-size: 22px; font-weight: 800; margin-bottom: 8px;
    }
    .loading-message {
      font-size: 14px; color: var(--muted); min-height: 20px;
      margin-bottom: 28px;
    }
    .progress-bar-bg {
      width: 100%; height: 6px; background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--gold);
      border-radius: 3px; transition: width 0.4s ease;
    }
    .progress-pct {
      font-size: 12px; color: var(--muted);
      margin-top: 8px; font-weight: 700;
    }
    .loading-spinner {
      width: 48px; height: 48px; border: 3px solid rgba(239,171,40,0.2);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.9s linear infinite; margin: 0 auto 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── REPORT LAYOUT ── */
    #report-screen {
      display: flex; height: calc(100vh - 64px);
    }

    /* LEFT SIDEBAR — team list */
    #team-sidebar {
      width: 300px; flex-shrink: 0;
      background: #0d1629; border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-controls {
      padding: 12px; border-bottom: 1px solid var(--border);
    }
    .sidebar-search {
      width: 100%; padding: 9px 12px; background: rgba(0,0,0,0.3);
      border: 1.5px solid rgba(255,255,255,0.1); border-radius: 8px;
      color: var(--text); font-size: 14px; font-family: inherit;
      transition: border-color 0.15s; margin-bottom: 8px;
    }
    .sidebar-search:focus { outline: none; border-color: var(--gold); }
    .sidebar-search::placeholder { color: var(--muted); }
    .sort-row {
      display: flex; gap: 6px; align-items: center;
    }
    .sort-label { font-size: 11px; color: var(--muted); font-weight: 700; white-space: nowrap; }
    .sort-select {
      flex: 1; padding: 6px 8px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      color: var(--text); font-size: 12px; font-family: inherit;
    }
    .sort-select option { background: #151D3B; }
    .sort-dir-btn {
      padding: 6px 8px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      color: var(--text); cursor: pointer; font-size: 13px;
      flex-shrink: 0;
    }
    .filter-tabs {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .filter-tab {
      flex: 1; padding: 5px; font-size: 11px; font-weight: 700;
      text-align: center; border-radius: 6px; cursor: pointer;
      letter-spacing: 0.04em; text-transform: uppercase;
      background: transparent; border: none; color: var(--muted);
      font-family: inherit; transition: all 0.15s;
    }
    .filter-tab.active {
      background: rgba(239,171,40,0.15); color: var(--gold);
    }

    #team-list { flex: 1; overflow-y: auto; }
    #team-list::-webkit-scrollbar { width: 4px; }
    #team-list::-webkit-scrollbar-track { background: transparent; }
    #team-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .team-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .team-row:hover { background: rgba(255,255,255,0.04); }
    .team-row.active { background: rgba(239,171,40,0.1); }
    .team-row-color {
      width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0;
    }
    .team-row-num {
      font-size: 16px; font-weight: 800; flex-shrink: 0; min-width: 46px;
    }
    .team-row-name {
      font-size: 12px; color: var(--muted); font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .team-row-epa {
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }
    .team-row-rank {
      font-size: 10px; color: var(--muted); flex-shrink: 0;
      min-width: 28px; text-align: right;
    }
    .watchlist-star {
      cursor: pointer; font-size: 14px; flex-shrink: 0;
      opacity: 0.3; transition: opacity 0.15s;
    }
    .watchlist-star.active { opacity: 1; }

    /* ── MAIN CONTENT AREA ── */
    #team-detail {
      flex: 1; overflow-y: auto; padding: 24px;
    }
    #team-detail::-webkit-scrollbar { width: 6px; }
    #team-detail::-webkit-scrollbar-track { background: transparent; }
    #team-detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .no-selection {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--muted);
      gap: 12px; text-align: center;
    }
    .no-selection-icon { font-size: 48px; opacity: 0.3; }
    .no-selection-text { font-size: 16px; font-weight: 600; }
    .no-selection-hint { font-size: 13px; opacity: 0.7; }

    /* TEAM DETAIL HEADER */
    .detail-header {
      display: flex; align-items: flex-start; gap: 20px; margin-bottom: 24px;
    }
    .detail-color-bar {
      width: 6px; min-height: 60px; border-radius: 3px; flex-shrink: 0; margin-top: 4px;
    }
    .detail-team-num {
      font-size: 48px; font-weight: 900; line-height: 1;
      letter-spacing: -1px;
    }
    .detail-team-name {
      font-size: 20px; font-weight: 700; margin-top: 4px;
    }
    .detail-team-loc {
      font-size: 13px; color: var(--muted); margin-top: 3px;
    }
    .detail-badges {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
    }
    .badge {
      padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .badge-gold { background: rgba(239,171,40,0.15); color: var(--gold); border: 1px solid rgba(239,171,40,0.3); }
    .badge-blue { background: rgba(96,165,250,0.12); color: #93c5fd; border: 1px solid rgba(96,165,250,0.25); }
    .badge-green { background: rgba(34,197,94,0.12); color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
    .badge-red { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
    .badge-gray { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }
    .detail-links {
      margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start;
    }
    .link-btn {
      padding: 7px 12px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      color: var(--text); font-size: 12px; font-weight: 700;
      text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background 0.15s; white-space: nowrap; font-family: inherit;
      letter-spacing: 0.03em;
    }
    .link-btn:hover { background: rgba(239,171,40,0.1); border-color: rgba(239,171,40,0.3); color: var(--gold); }

    /* STAT CARDS ROW */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card); border-radius: 12px;
      padding: 14px 16px; border: 1px solid var(--border);
    }
    .stat-card-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--muted); margin-bottom: 6px;
    }
    .stat-card-value {
      font-size: 28px; font-weight: 900; line-height: 1;
    }
    .stat-card-sub {
      font-size: 11px; color: var(--muted); margin-top: 3px;
    }

    /* EPA BAR */
    .epa-section { margin-bottom: 24px; }
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--gold); margin-bottom: 12px;
    }
    .epa-bars { background: var(--card); border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
    .epa-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .epa-bar-row:last-child { margin-bottom: 0; }
    .epa-bar-label { font-size: 12px; font-weight: 700; color: var(--muted); width: 70px; flex-shrink: 0; text-align: right; }
    .epa-bar-bg { flex: 1; height: 10px; background: rgba(255,255,255,0.07); border-radius: 5px; overflow: hidden; }
    .epa-bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s ease; }
    .epa-bar-val { font-size: 13px; font-weight: 800; width: 46px; text-align: right; flex-shrink: 0; }

    /* PEAK vs AVG ANALYSIS */
    .analysis-section { margin-bottom: 24px; }
    .analysis-card {
      background: var(--card); border-radius: 12px;
      padding: 16px; border: 1px solid var(--border);
    }
    .peak-avg-row {
      display: flex; gap: 16px; margin-bottom: 14px;
    }
    .peak-avg-box {
      flex: 1; background: rgba(0,0,0,0.25); border-radius: 8px; padding: 12px;
      text-align: center;
    }
    .peak-avg-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .peak-avg-val { font-size: 32px; font-weight: 900; line-height: 1.1; margin-top: 4px; }
    .peak-avg-matches { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .score-bar-section { margin-top: 14px; }
    .score-bar-label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 4px;
    }
    .score-bar-bg {
      width: 100%; height: 8px; background: rgba(255,255,255,0.07);
      border-radius: 4px; overflow: hidden; position: relative;
    }
    .score-bar-avg { position: absolute; height: 100%; background: #60a5fa; border-radius: 4px; }
    .score-bar-peak { position: absolute; height: 100%; background: var(--gold); border-radius: 0 4px 4px 0; }

    /* MATCHES TABLE */
    .matches-section { margin-bottom: 24px; }
    .matches-table { width: 100%; border-collapse: collapse; }
    .matches-table th {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); text-align: left;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
    }
    .matches-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; vertical-align: middle; }
    .matches-table tr:last-child td { border-bottom: none; }
    .matches-table tr:hover td { background: rgba(255,255,255,0.02); }
    .match-score { font-size: 18px; font-weight: 900; }
    .match-score.win { color: var(--green); }
    .match-score.loss { color: #f87171; }
    .match-score.neutral { color: var(--text); }
    .match-event-name { font-size: 12px; color: var(--muted); }
    .match-level { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-right: 4px; }
    .match-level.qm { background: rgba(96,165,250,0.15); color: #93c5fd; }
    .match-level.sf { background: rgba(239,171,40,0.15); color: var(--gold); }
    .match-level.f  { background: rgba(34,197,94,0.15); color: #86efac; }
    .video-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3); border-radius: 6px;
      color: #fca5a5; font-size: 11px; font-weight: 700;
      text-decoration: none; transition: background 0.15s;
    }
    .video-btn:hover { background: rgba(239,68,68,0.25); }
    .no-video { font-size: 11px; color: rgba(255,255,255,0.2); }

    /* EVENTS ATTENDED */
    .events-section { margin-bottom: 24px; }
    .event-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: var(--card);
      border: 1px solid var(--border); border-radius: 8px;
      margin: 0 6px 6px 0; font-size: 13px; font-weight: 600;
    }
    .event-chip-record { font-size: 11px; color: var(--muted); }

    /* OWN SCOUT DATA (DaveScout) */
    .own-scout-section { margin-bottom: 24px; }
    .own-scout-rating { display: flex; gap: 4px; margin-bottom: 12px; }
    .own-scout-star { font-size: 20px; line-height: 1; color: #a78bfa; }
    .own-scout-star.empty { color: rgba(255,255,255,0.15); }
    .own-scout-fields { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .own-scout-field {
      display: flex; gap: 10px; align-items: center;
      padding: 7px 12px; background: rgba(0,0,0,0.2); border-radius: 8px;
      font-size: 13px;
    }
    .own-scout-field-name { color: var(--muted); font-weight: 700; flex: 1; }
    .own-scout-field-val { font-weight: 800; }

    /* UPLOAD ZONE */
    .upload-zone {
      width: 100%; padding: 22px 16px; background: rgba(0,0,0,0.3);
      border: 1.5px dashed rgba(255,255,255,0.15); border-radius: 10px;
      text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--gold); background: rgba(245,166,35,0.05);
    }
    .source-chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 10px 5px 8px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05); font-size: 12px; font-weight: 600;
    }
    .source-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .source-chip-remove {
      margin-left: 2px; cursor: pointer; opacity: .5; font-size: 14px; line-height: 1;
      color: var(--text); border: none; background: none; padding: 0;
    }
    .source-chip-remove:hover { opacity: 1; }
    .event-tab-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
    .event-tab {
      padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700;
      letter-spacing: .04em; cursor: pointer; transition: all .15s;
      border: 1px solid rgba(255,255,255,0.12); background: transparent; color: var(--muted);
    }
    .event-tab.active { border-color: var(--gold); background: rgba(245,166,35,0.12); color: var(--gold); }

    /* 1073 SCOUT DATA */
    .scout-section { margin-bottom: 24px; }
    .scout-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px; margin-bottom: 12px;
    }
    .scout-card {
      background: rgba(0,0,0,0.25); border-radius: 10px; padding: 12px;
      border: 1px solid rgba(34,197,94,0.2); text-align: center;
    }
    .scout-card-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #22c55e; margin-bottom: 4px;
    }
    .scout-card-val { font-size: 22px; font-weight: 900; color: var(--text); }
    .scout-card-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .scout-matches { display: flex; flex-direction: column; gap: 4px; }
    .scout-match-row {
      display: flex; gap: 8px; font-size: 12px;
      padding: 6px 10px; background: rgba(0,0,0,0.2); border-radius: 6px;
      align-items: center;
    }
    .scout-match-num { color: var(--muted); width: 50px; flex-shrink: 0; font-weight: 700; }
    .scout-match-seg { flex: 1; text-align: center; }
    .scout-match-total { font-weight: 900; width: 40px; text-align: right; flex-shrink: 0; }

    /* NOTES SECTION */
    .notes-section { margin-bottom: 24px; }
    .notes-textarea {
      width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3);
      border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px;
      color: var(--text); font-size: 14px; font-family: inherit;
      resize: vertical; min-height: 80px; line-height: 1.5;
      transition: border-color 0.15s;
    }
    .notes-textarea:focus { outline: none; border-color: var(--gold); }
    .notes-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* WATCHLIST TOGGLE */
    .watchlist-toggle {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; padding: 10px 0;
    }
    .watchlist-toggle-icon { font-size: 20px; }
    .watchlist-toggle-label { font-size: 14px; font-weight: 700; }

    /* EVENT SUMMARY BANNER */
    .event-banner {
      background: var(--card); border-radius: 12px;
      padding: 16px 20px; border: 1px solid var(--border);
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .event-banner-name { font-size: 18px; font-weight: 800; flex: 1; }
    .event-banner-stat { text-align: center; min-width: 70px; }
    .event-banner-stat-val { font-size: 22px; font-weight: 900; color: var(--gold); }
    .event-banner-stat-lbl { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

    /* ERROR STATE */
    .error-banner {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 14px 16px; color: #fca5a5;
      font-size: 14px; font-weight: 600; margin-top: 16px;
    }

    /* EPA COLOR CLASSES */
    .epa-tier-elite { color: #a855f7; }
    .epa-tier-great  { color: #22c55e; }
    .epa-tier-good   { color: #86efac; }
    .epa-tier-avg    { color: var(--gold); }
    .epa-tier-below  { color: #fb923c; }
    .epa-tier-low    { color: #f87171; }

    /* SCORE DISTRIBUTION — micro sparkline */
    .sparkline-wrap { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
    .sparkline-bar { background: rgba(96,165,250,0.5); border-radius: 2px 2px 0 0; min-width: 4px; transition: background 0.2s; }
    .sparkline-bar:hover { background: var(--gold); }

    /* RESPONSIVE — narrow sidebar on medium screens */
    @media (max-width: 900px) {
      #team-sidebar { width: 240px; }
      .detail-team-num { font-size: 38px; }
    }

    /* SCROLLBAR GLOBAL */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>

<div id="app-root"></div>

<script>
// ════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════
const TBA      = 'https://www.thebluealliance.com/api/v3';
const SB       = 'https://api.statbotics.io/v3';
const COLORS   = 'https://frc-colors.com/api/v1/team';
const CACHE_TTL = 20 * 60 * 1000; // 20 min

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
const S = {
  phase: 'setup',       // setup | loading | report
  tbaKey: '',
  eventKey: '',
  year: 2026,

  // fetched data
  eventInfo:    null,
  teams:        [],     // array of TBA team objects
  oprs:         {},     // { oprs: {frcXXXX: val}, dprs: {...}, ccwms: {...} }
  rankings:     {},     // { teamNum: { rank, wlt } }
  statbotics:   {},     // teamNum -> SB data
  teamEvents:   {},     // teamNum -> array of event objects
  teamMatches:  {},     // teamNum -> array of processed match objects
  teamColors:   {},     // teamNum -> { primaryHex, secondaryHex }
  scoutData:    {},     // teamNum -> { avgAuto, avgTele, avgEnd, avgTotal, matchCount, matches[] }
  ownScoutData: {},     // teamNum -> { matchCount, avgAuto, avgTele, avgClimb, avgTotal, peak, avgDriver, matches[] }
  scoutView:    'combined', // 'combined' | '1073' | '6328'
  loadedSources: [],   // [{ id, name, type:'agg'|'perMatch', color, teamCount, matchCount, events[], rawData:{} }]
  eventFilter:   'all',// 'all' | event key string
  watchlist:    {},     // teamNum -> bool
  notes:        {},     // teamNum -> string

  // ui
  sortBy:       'epa',
  sortDir:      'desc',
  filterText:   '',
  filterTab:    'all',  // all | watchlist
  selectedTeam: null,

  // loading progress
  progress:     { pct: 0, msg: '' },
};

// ════════════════════════════════════════════════════
//  PERSISTENCE
// ════════════════════════════════════════════════════
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
function loadPersisted() {
  S.tbaKey   = LS.get('ps_tbaKey')   || '';
  S.eventKey = LS.get('ps_eventKey') || '2026MABIL';
  S.watchlist= LS.get('ps_watchlist')|| {};
  S.notes    = LS.get('ps_notes')    || {};
}
function persistWatchlist() { LS.set('ps_watchlist', S.watchlist); }
function persistNotes()     { LS.set('ps_notes', S.notes); }
function persistSettings()  {
  LS.set('ps_tbaKey', S.tbaKey);
  LS.set('ps_eventKey', S.eventKey);
}

// ════════════════════════════════════════════════════
//  CACHE
// ════════════════════════════════════════════════════
function cacheGet(key) {
  try {
    const raw = localStorage.getItem('ps_cache_' + key);
    if (!raw) return null;
    const { d, t } = JSON.parse(raw);
    if (Date.now() - t > CACHE_TTL) return null;
    return d;
  } catch { return null; }
}
function cacheSet(key, data) {
  try {
    localStorage.setItem('ps_cache_' + key,
      JSON.stringify({ d: data, t: Date.now() }));
  } catch {}
}
function clearCache() {
  for (const k of Object.keys(localStorage)) {
    if (k.startsWith('ps_cache_')) localStorage.removeItem(k);
  }
}

// ════════════════════════════════════════════════════
//  API LAYER
// ════════════════════════════════════════════════════
async function tba(path) {
  const cacheKey = 'tba_' + path;
  const cached = cacheGet(cacheKey);
  if (cached !== null) return cached;
  const res = await fetch(TBA + path, {
    headers: { 'X-TBA-Auth-Key': S.tbaKey }
  });
  if (!res.ok) throw new Error(`TBA ${res.status}: ${path}`);
  const data = await res.json();
  cacheSet(cacheKey, data);
  return data;
}

async function sbFetch(teamNum, year) {
  const cacheKey = `sb_ty_${teamNum}_${year}`;
  const cached = cacheGet(cacheKey);
  if (cached !== null) return cached;
  try {
    const res = await fetch(`${SB}/team_year/${teamNum}/${year}`);
    if (!res.ok) return null;
    const data = await res.json();
    cacheSet(cacheKey, data);
    return data;
  } catch { return null; }
}

async function fetchTeamColor(teamNum) {
  const cached = cacheGet('color_' + teamNum);
  if (cached !== null) return cached;
  try {
    const res = await fetch(`${COLORS}/${teamNum}`);
    if (!res.ok) return null;
    const data = await res.json();
    cacheSet('color_' + teamNum, data);
    return data;
  } catch { return null; }
}

// throttled parallel execution
async function throttledAll(items, fn, concurrency = 8) {
  const results = [];
  let i = 0;
  async function worker() {
    while (i < items.length) {
      const idx = i++;
      results[idx] = await fn(items[idx], idx).catch(e => null);
    }
  }
  await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, worker));
  return results;
}

// ════════════════════════════════════════════════════
//  DATA FETCHING
// ════════════════════════════════════════════════════
function setProgress(pct, msg) {
  S.progress = { pct, msg };
  const fill = document.getElementById('progress-fill');
  const msgEl = document.getElementById('progress-msg');
  const pctEl = document.getElementById('progress-pct');
  if (fill) fill.style.width = pct + '%';
  if (msgEl) msgEl.textContent = msg;
  if (pctEl) pctEl.textContent = Math.round(pct) + '%';
}

async function generateReport() {
  const key = S.eventKey.trim().toLowerCase();
  if (!key) { alert('Please enter an event key.'); return; }
  S.eventKey = key;
  S.year = parseInt(key.match(/^(\d{4})/)?.[1] || '2026');
  persistSettings();

  // Immediately disable the button so user knows click registered
  const btn = document.getElementById('s-generate');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Fetching data…'; }

  S.phase = 'loading';
  S.progress = { pct: 0, msg: `Connecting to TBA for ${key.toUpperCase()}…` };
  render();

  // CRITICAL: yield to the browser so it can paint the loading screen
  // before we start the blocking fetch chain
  await new Promise(r => setTimeout(r, 80));

  try {
    // ── Phase 1: Event metadata (parallel) ──
    setProgress(2, `Loading event info for ${key.toUpperCase()}…`);
    const [eventInfo, teams, oprs, rankings] = await Promise.allSettled([
      tba(`/event/${key}`),
      tba(`/event/${key}/teams/simple`),
      tba(`/event/${key}/oprs`),
      tba(`/event/${key}/rankings`),
    ]).then(r => r.map(x => x.status === 'fulfilled' ? x.value : null));

    if (!teams || teams.length === 0) throw new Error('No teams found for event "' + key + '". Check your event key.');
    S.eventInfo = eventInfo;
    S.teams = teams.sort((a, b) => a.team_number - b.team_number);
    S.oprs = oprs || {};
    S.rankings = processRankings(rankings);

    const total = S.teams.length;
    setProgress(8, `Found ${total} teams. Fetching season stats…`);

    // ── Phase 2: Per-team (Statbotics + TBA events) ──
    let done = 0;
    await throttledAll(S.teams, async (team) => {
      const num = team.team_number;
      const [sbData, teamEvts] = await Promise.all([
        sbFetch(num, S.year),
        tba(`/team/${team.key}/events/${S.year}/simple`).catch(() => []),
      ]);
      S.statbotics[num] = sbData;
      S.teamEvents[num] = (teamEvts || []).sort((a, b) =>
        new Date(a.start_date) - new Date(b.start_date));
      done++;
      setProgress(8 + (done / total) * 37, `Loading team stats… (${done}/${total})`);
    }, 10);

    // ── Phase 3: Team colors (background, non-blocking) ──
    setProgress(48, 'Fetching team colors…');
    await throttledAll(S.teams, async (team) => {
      const color = await fetchTeamColor(team.team_number);
      if (color?.primaryHex) S.teamColors[team.team_number] = color;
    }, 12);

    // ── Phase 4: Match history (deduped by event) ──
    setProgress(52, 'Collecting match history…');
    const uniqueEventKeys = new Set();
    for (const team of S.teams) {
      for (const evt of S.teamEvents[team.team_number] || []) {
        if (evt.key !== key) uniqueEventKeys.add(evt.key);
      }
    }
    // Also try current event
    uniqueEventKeys.add(key);
    const eventKeyList = Array.from(uniqueEventKeys);
    const allMatchesByEvent = {};
    let evtDone = 0;

    await throttledAll(eventKeyList, async (evtKey) => {
      const matches = await tba(`/event/${evtKey}/matches`).catch(() => []);
      allMatchesByEvent[evtKey] = matches || [];
      evtDone++;
      setProgress(52 + (evtDone / eventKeyList.length) * 40,
        `Loading match data… (${evtDone}/${eventKeyList.length} events)`);
    }, 8);

    // ── Phase 5: Process per-team match stats ──
    setProgress(94, 'Processing scores…');
    for (const team of S.teams) {
      S.teamMatches[team.team_number] = extractTeamMatches(
        team.key, allMatchesByEvent
      );
    }

    setProgress(100, 'Done!');
    await new Promise(r => setTimeout(r, 400));
    S.phase = 'report';
    S.selectedTeam = S.teams[0]?.team_number || null;
    render();

  } catch (err) {
    let msg = err.message || 'Unknown error';
    if (msg.includes('401')) msg = 'TBA API key rejected (401). Check your key at thebluealliance.com/account.';
    else if (msg.includes('404')) msg = `Event "${S.eventKey}" not found (404). Double-check the event key — e.g. 2026mabil.`;
    else if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) msg = 'Network error. Check your internet connection and try again.';
    showError(msg);
  }
}

function processRankings(raw) {
  if (!raw?.rankings) return {};
  const out = {};
  for (const r of raw.rankings) {
    const num = parseInt(r.team_key.replace('frc', ''));
    out[num] = {
      rank: r.rank,
      wins: r.record?.wins ?? 0,
      losses: r.record?.losses ?? 0,
      ties: r.record?.ties ?? 0,
      dq: r.dq ?? 0,
    };
  }
  return out;
}

function extractTeamMatches(teamKey, allMatchesByEvent) {
  const matches = [];
  for (const [evtKey, evtMatches] of Object.entries(allMatchesByEvent)) {
    for (const m of evtMatches) {
      const alliance = getAlliance(m, teamKey);
      if (!alliance) continue;
      const score = m.alliances?.[alliance]?.score ?? -1;
      if (score < 0) continue;

      const videos = (m.videos || [])
        .filter(v => v.type === 'youtube')
        .map(v => `https://www.youtube.com/watch?v=${v.key}`);

      matches.push({
        matchKey:   m.key,
        eventKey:   evtKey,
        compLevel:  m.comp_level || 'qm',
        matchNum:   m.match_number,
        setNum:     m.set_number,
        alliance,
        score,
        won:        m.winning_alliance === alliance,
        videos,
        time:       m.actual_time || m.predicted_time || 0,
      });
    }
  }
  return matches.sort((a, b) => b.score - a.score);
}

function getAlliance(match, teamKey) {
  if (match.alliances?.red?.team_keys?.includes(teamKey)) return 'red';
  if (match.alliances?.blue?.team_keys?.includes(teamKey)) return 'blue';
  return null;
}

// ════════════════════════════════════════════════════
//  DATA PROCESSING
// ════════════════════════════════════════════════════
function getTeamStats(num) {
  const sb  = S.statbotics[num];
  const opr = S.oprs?.oprs?.[`frc${num}`] ?? null;
  const dpr = S.oprs?.dprs?.[`frc${num}`] ?? null;
  const ccwm= S.oprs?.ccwms?.[`frc${num}`] ?? null;
  const ranking = S.rankings[num];
  const matches = S.teamMatches[num] || [];
  const scores  = matches.map(m => m.score).filter(s => s >= 0);

  const peak = scores.length ? Math.max(...scores) : null;
  const avg  = scores.length ? scores.reduce((a, b) => a + b, 0) / scores.length : null;
  let stdDev = null;
  if (scores.length > 2) {
    const mean = avg;
    const vari = scores.reduce((a, s) => a + (s - mean) ** 2, 0) / scores.length;
    stdDev = Math.sqrt(vari);
  }
  const wins   = matches.filter(m => m.won).length;
  const losses = matches.filter(m => !m.won).length;
  const qualMatches = matches.filter(m => m.compLevel === 'qm');
  const qualScores  = qualMatches.map(m => m.score);
  const qualAvg = qualScores.length
    ? qualScores.reduce((a, b) => a + b, 0) / qualScores.length : null;

  // EPA from Statbotics (try multiple field shapes)
  let epaTotal = null, epaAuto = null, epaTeleop = null, epaEnd = null, epaSD = null;
  if (sb) {
    epaTotal = sb?.epa?.total_points?.mean
            ?? sb?.epa?.mean
            ?? sb?.unitless_epa
            ?? null;
    epaSD    = sb?.epa?.total_points?.sd
            ?? sb?.epa?.sd
            ?? null;
    const br = sb?.epa?.breakdown;
    if (br) {
      epaAuto   = br.auto_points?.mean   ?? br.auto   ?? null;
      epaTeleop = br.teleop_points?.mean ?? br.teleop ?? null;
      epaEnd    = br.endgame_points?.mean ?? br.endgame ?? null;
    }
  }

  // Best matches w/ video preferred
  const topMatches = [...matches]
    .sort((a, b) => {
      if (b.videos.length && !a.videos.length) return 1;
      if (a.videos.length && !b.videos.length) return -1;
      return b.score - a.score;
    })
    .slice(0, 8);

  // Worst matches w/ video preferred
  const worstMatches = [...matches]
    .sort((a, b) => {
      if (b.videos.length && !a.videos.length) return 1;
      if (a.videos.length && !b.videos.length) return -1;
      return a.score - b.score;  // ascending — lowest first
    })
    .slice(0, 5);

  return {
    num, opr, dpr, ccwm, ranking,
    peak, avg, qualAvg, stdDev, scores,
    wins, losses, totalMatches: matches.length,
    epaTotal, epaAuto, epaTeleop, epaEnd, epaSD,
    topMatches, worstMatches,
    allMatches: matches,
    eventsAttended: (S.teamEvents[num] || []).length,
  };
}

function allTeamStats() {
  return S.teams.map(t => getTeamStats(t.team_number));
}

function getEPATier(epa, allEpas) {
  if (epa === null || allEpas.length === 0) return 'avg';
  const sorted = [...allEpas].filter(e => e != null).sort((a, b) => a - b);
  const pct = sorted.filter(e => e <= epa).length / sorted.length;
  if (pct >= 0.92) return 'elite';
  if (pct >= 0.80) return 'great';
  if (pct >= 0.62) return 'good';
  if (pct >= 0.38) return 'avg';
  if (pct >= 0.20) return 'below';
  return 'low';
}

function render() {
  updateHeader();
  const root = document.getElementById('app-root');
  if (S.phase === 'setup')        { root.innerHTML = renderSetup(); }
  else if (S.phase === 'loading') { root.innerHTML = renderLoading(); }
  else if (S.phase === 'report')  { root.innerHTML = renderReport(); attachReportListeners(); }
}

function updateHeader() {
  const center  = document.getElementById('header-center');
  const actions = document.getElementById('header-actions');
  if (S.phase === 'report' && S.eventInfo) {
    center.innerHTML = `
      <span class="header-event-badge">${S.eventKey.toUpperCase()}</span>
      <span style="font-size:13px; color:var(--muted); font-weight:600; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${S.eventInfo.name || ''}</span>
    `;
    actions.innerHTML = `
      <button class="header-btn outline" onclick="S.phase='setup';S.selectedTeam=null;render()">← NEW REPORT</button>
      <button class="header-btn outline" onclick="clearCache();alert('Cache cleared.')">CLEAR CACHE</button>
      <button class="header-btn outline" style="color:var(--gold);border-color:rgba(245,166,35,0.4);" onclick="document.getElementById('scout-hdr-input').click()">
        ${S.loadedSources.length > 0 ? '✓ SCOUT (' + S.loadedSources.length + ' file' + (S.loadedSources.length>1?'s':'') + ')' : '+ SCOUT DATA'}
      </button>
      <input type="file" id="scout-hdr-input" multiple accept=".csv,.tsv,.txt" style="display:none;" onchange="loadScoutFiles(this)">
      <button class="header-btn" onclick="exportNotes()">EXPORT NOTES</button>
    `;
  } else {
    center.innerHTML = '';
    actions.innerHTML = '';
  }
}

// ── LOADING ──
function renderLoading() {
  return `
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-title">Building Pre-Scout Report</div>
    <div style="font-size:13px; color:var(--gold); font-weight:700; margin-bottom:12px; letter-spacing:0.05em;">${S.eventKey.toUpperCase()}</div>
    <div class="loading-message" id="progress-msg">${S.progress.msg || 'Connecting…'}</div>
    <div class="progress-bar-bg" style="margin-bottom:8px;">
      <div class="progress-bar-fill" id="progress-fill" style="width:${S.progress.pct}%"></div>
    </div>
    <div class="progress-pct" id="progress-pct">${Math.round(S.progress.pct)}%</div>
    <div style="font-size:12px; color:var(--muted); margin-top:20px; line-height:1.8;">
      Pulling: TBA event data · Statbotics EPA · Team match history · Team colors<br>
      <span style="color:rgba(244,244,238,0.3);">This takes ~15–30 sec for a full event field</span>
    </div>
  </div>`;
}

// ── REPORT ──
function renderReport() {
  const stats = allTeamStats();
  const allEpas = stats.map(s => s.epaTotal).filter(e => e != null);

  let filtered = stats;
  if (S.filterTab === 'watchlist') filtered = filtered.filter(s => S.watchlist[s.num]);
  if (S.filterText) {
    const q = S.filterText.toLowerCase();
    filtered = filtered.filter(s => {
      const team = S.teams.find(t => t.team_number === s.num);
      return String(s.num).includes(q) ||
             (team?.nickname || '').toLowerCase().includes(q) ||
             (team?.city || '').toLowerCase().includes(q);
    });
  }

  // Sort
  filtered.sort((a, b) => {
    let va, vb;
    switch (S.sortBy) {
      case 'epa':   va = a.epaTotal ?? -999; vb = b.epaTotal ?? -999; break;
      case 'opr':   va = a.opr ?? -999;      vb = b.opr ?? -999;      break;
      case 'peak':  va = a.peak ?? -999;     vb = b.peak ?? -999;     break;
      case 'avg':   va = a.avg ?? -999;      vb = b.avg ?? -999;      break;
      case 'cons':  va = a.stdDev === null ? 999 : a.stdDev;
                    vb = b.stdDev === null ? 999 : b.stdDev;
                    // lower stdDev = more consistent, so reverse
                    return S.sortDir === 'desc' ? va - vb : vb - va;
      case 'scout':    va = S.scoutData[a.num]?.avgTotal ?? -999;
                      vb = S.scoutData[b.num]?.avgTotal ?? -999; break;
      case 'ownscout': va = S.ownScoutData[a.num]?.avgTotal ?? -999;
                       vb = S.ownScoutData[b.num]?.avgTotal ?? -999; break;
      case 'rank':  va = a.ranking?.rank ?? 9999; vb = b.ranking?.rank ?? 9999;
                    return S.sortDir === 'asc' ? va - vb : vb - va;
      case 'num':   va = a.num; vb = b.num; break;
      default:      va = a.epaTotal ?? -999; vb = b.epaTotal ?? -999;
    }

function renderTeamRow(stats, allEpas) {
  const team  = S.teams.find(t => t.team_number === stats.num);
  const color = S.teamColors[stats.num]?.primaryHex || '#446CE3';
  const tier  = getEPATier(stats.epaTotal, allEpas);
  const isActive  = S.selectedTeam === stats.num;
  const inWatch   = !!S.watchlist[stats.num];
  const hasScout  = !!S.scoutData[stats.num];
  const rankStr   = stats.ranking ? `#${stats.ranking.rank}` : '';

  const metricVal = (() => {
    switch (S.sortBy) {
      case 'opr':  return stats.opr  !== null ? stats.opr.toFixed(1)  : '—';
      case 'peak': return stats.peak != null ? Math.round(stats.peak) : '—';
      case 'avg':  return stats.avg  !== null ? Math.round(stats.avg)  : '—';
      case 'cons': return stats.stdDev != null ? '±' + Math.round(stats.stdDev) : '—';
      case 'rank': return rankStr || '—';
      case 'scout': {
        const sd = S.scoutData[stats.num];
        return sd ? Math.round(sd.avgTotal) + '<span style="font-size:9px;color:var(--muted);margin-left:2px;">sc</span>' : '—';
      }
      case 'num':  return stats.num;
      default:     return stats.epaTotal != null ? stats.epaTotal.toFixed(1) : '—';

  return `

function renderMatchRow(m) {
  const levelLabel = { qm: 'Qual', sf: 'Semi', f: 'Final', ef: 'EF' }[m.compLevel] || m.compLevel.toUpperCase();
  const matchLabel = m.compLevel === 'qm'
    ? `${levelLabel} ${m.matchNum}`
    : `${levelLabel} ${m.setNum}-${m.matchNum}`;
  const eventName = getEventName(m.eventKey);
  const wonClass = m.won ? 'win' : 'loss';
  const wonStr   = m.won ? '✅ Win' : '❌ Loss';
  const videoHTML = m.videos.length
    ? m.videos.map(v => `<a class="video-btn" href="${v}" target="_blank">▶ YouTube</a>`).join(' ')
    : '<span class="no-video">—</span>';

  return `<tr>
    <td>
      <span class="match-level ${m.compLevel}">${matchLabel}</span>
    </td>
    <td><div class="match-event-name">${escHtml(eventName)}</div></td>
    <td><span class="match-score ${wonClass}">${Math.round(m.score)}</span></td>
    <td style="font-size:12px;">${wonStr}</td>
    <td>${videoHTML}</td>
  </tr>`;
}

function renderSparkline(scores) {
  if (!scores || scores.length < 2) return '';
  const sorted = [...scores].sort((a, b) => b - a); // high to low
  const max = Math.max(...sorted);
  return sorted.map(s => {
    const h = Math.max(4, Math.round((s / max) * 28));
    return `<div class="sparkline-bar" style="height:${h}px;" title="${Math.round(s)}"></div>`;
  }).join('');
}

function getEventName(eventKey) {
  // Try to find in teamEvents cache
  for (const evts of Object.values(S.teamEvents)) {
    const found = evts.find(e => e.key === eventKey);
    if (found) return found.short_name || found.name || eventKey;
  }
  if (S.eventInfo?.key === eventKey) return S.eventInfo.short_name || S.eventInfo.name || eventKey;
  return eventKey;
}

function getEventRecord(teamNum, eventKey) {
  const matches = (S.teamMatches[teamNum] || []).filter(m => m.eventKey === eventKey);
  if (!matches.length) return null;
  const w = matches.filter(m => m.won).length;
  const l = matches.filter(m => !m.won).length;
  const peak = Math.max(...matches.map(m => m.score));
  return `${w}W ${l}L · Peak ${Math.round(peak)}`;
}

function exportNotes() {
  const out = {};
  for (const [num, note] of Object.entries(S.notes)) {
    if (note?.trim()) {
      const team = S.teams.find(t => String(t.team_number) === num);
      out[num] = {
        team_number: parseInt(num),
        nickname: team?.nickname || '',
        notes: note.trim(),
        watchlist: !!S.watchlist[num],
      };
    }
  }
  // Also include watchlisted teams without notes
  for (const [num, val] of Object.entries(S.watchlist)) {
    if (val && !out[num]) {
      const team = S.teams.find(t => String(t.team_number) === num);
      out[num] = { team_number: parseInt(num), nickname: team?.nickname || '', notes: '', watchlist: true };
    }
  }
  const json = JSON.stringify(Object.values(out), null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `prescout-${S.eventKey}-notes.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadScoutCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try { parseScoutCSV(e.target.result); }
    catch(err) {
      const el = document.getElementById('scout-csv-status');
      if (el) el.textContent = '⚠ Failed to parse: ' + err.message;
    }
  };
  reader.readAsText(file, 'UTF-16');
}

function parseScoutCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if (lines.length < 2) throw new Error('No data rows');
  const delim = lines[0].includes('\t') ? '\t' : ',';
  const headers = lines[0].split(delim).map(h => h.trim());
  const ci = name => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
  const teamIdx  = ci('team');
  const autoFuel = ci('auto fuel');
  const autoClmb = ci('auto climb');
  const teleFuel = ci('tele fuel');
  const endClmb  = ci('endgame climb');
  const totalIdx = ci('total points');
  if (teamIdx === -1) throw new Error('No Team column');
  const agg = {};
  for (let i = 1; i < lines.length; i++) {
    const row = lines[i].split(delim).map(c => c.trim());
    const num = parseInt(row[teamIdx]);
    if (isNaN(num)) continue;
    const auto  = (autoFuel >= 0 ? +row[autoFuel]||0 : 0) + (autoClmb >= 0 ? +row[autoClmb]||0 : 0);
    const tele  = teleFuel >= 0 ? +row[teleFuel]||0 : 0;
    const end   = endClmb  >= 0 ? +row[endClmb] ||0 : 0;
    const total = totalIdx >= 0 ? +row[totalIdx]||0 : 0;
    if (!agg[num]) agg[num] = { auto:[], tele:[], end:[], total:[] };
    agg[num].auto.push(auto); agg[num].tele.push(tele);
    agg[num].end.push(end);   agg[num].total.push(total);
  }
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const result = {};
  for (const [num, d] of Object.entries(agg)) {
    result[+num] = {
      matchCount: d.total.length,
      avgAuto: avg(d.auto), avgTele: avg(d.tele),
      avgEnd:  avg(d.end),  avgTotal: avg(d.total),
      peak: Math.max(...d.total),
      matches: d.total.map((tot,i) => ({ match:i+1, auto:d.auto[i], tele:d.tele[i], end:d.end[i], total:tot })),
    };
  }
  S.scoutData = result;
  const count = Object.keys(result).length;
  const total = Object.values(result).reduce((s,t)=>s+t.matchCount,0);
  const el = document.getElementById('scout-csv-status');
  if (el) { el.textContent = `✓ Loaded ${count} teams · ${total} match records`; el.style.color='#22c55e'; }
}

function loadOwnScoutCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      parseOwnScoutCSV(e.target.result);
      render();
    } catch(err) { alert('Failed to parse scout data: ' + err.message); }
  };
  reader.readAsText(file, 'utf-8');
}

function parseCSVLine(line) {
  // Proper CSV parser: handles quoted fields, embedded commas, escaped quotes ("")
  const fields = [];
  let i = 0;
  while (i <= line.length) {
    if (line[i] === '"') {
      let field = '';
      i++; // skip opening quote
      while (i < line.length) {
        if (line[i] === '"' && line[i+1] === '"') { field += '"'; i += 2; }
        else if (line[i] === '"') { i++; break; } // closing quote
        else { field += line[i++]; }
      }
      fields.push(field.trim());
      if (line[i] === ',') i++; // skip trailing comma
    } else {
      const end = line.indexOf(',', i);
      if (end === -1) { fields.push(line.substring(i).trim()); break; }
      fields.push(line.substring(i, end).trim());
      i = end + 1;
    }
  }
  return fields;
}

function parseOwnScoutCSV(text) {
  // Strip UTF-8 BOM if present
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return;
  // Parse header row with proper CSV parser (fields may be quoted)
  const headers = parseCSVLine(lines[0]);
  const col = name => headers.indexOf(name);
  const iTeam    = col('Team');
  const iMatch   = col('Match');
  // Use actual robot point columns, not *Contrabution (those are alliance %)
  const iAuto    = col('AutoPoints');
  const iTele    = col('TelePoints');
  const iClimb   = col('TeleClimbPoints');
  const iTotal   = col('TotalPoints');
  // Also grab contribution % for display as a secondary metric
  const iAutoPct = col('AutoPointsContrabution');
  const iTelePct = col('TelePointsContrabution');
  const iTotPct  = col('TotalPointsContrabution');
  const iDriver  = col('DriverRating');
  const iState   = col('BotStateText');
  const iComment = col('Comment');
  if (iTeam === -1) throw new Error('Could not find Team column — is this the right file?');
  const byTeam   = {};
  for (let i = 1; i < lines.length; i++) {
    const row = parseCSVLine(lines[i]);
    const team = parseInt(row[iTeam]);
    if (isNaN(team)) continue;
    if (!byTeam[team]) byTeam[team] = [];
    byTeam[team].push({
      match:    row[iMatch] || '?',
      auto:     parseFloat(row[iAuto])    || 0,
      tele:     parseFloat(row[iTele])    || 0,
      climb:    parseFloat(row[iClimb])   || 0,
      total:    parseFloat(row[iTotal])   || 0,
      autoPct:  parseFloat(row[iAutoPct]) || 0,
      telePct:  parseFloat(row[iTelePct]) || 0,
      totPct:   parseFloat(row[iTotPct])  || 0,
      driver:  row[iDriver] ? parseFloat(row[iDriver]) : null,
      state:   row[iState]   || '',
      comment: row[iComment] || ''
    });
  }
  const result = {};
  for (const [team, matches] of Object.entries(byTeam)) {
    const n    = matches.length;
    const avg  = arr => arr.reduce((s,v)=>s+v,0)/n;
    const tots = matches.map(m=>m.total);
    const drs  = matches.map(m=>m.driver).filter(v=>v!=null);
    result[parseInt(team)] = {
      matchCount: n,
      avgAuto:    avg(matches.map(m=>m.auto)),
      avgTele:    avg(matches.map(m=>m.tele)),
      avgClimb:   avg(matches.map(m=>m.climb)),
      avgTotal:   avg(tots),
      peak:       Math.max(...tots),
      avgDriver:  drs.length ? drs.reduce((s,v)=>s+v,0)/drs.length : null,
      matches:    matches.sort((a,b)=>parseInt(a.match)-parseInt(b.match))
    };
  }
  S.ownScoutData = result;
}

          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">${driverLabel||'Driver'}</div>
        </div>`:''}
      </div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;">Match Breakdown</div>
      ${matchRows}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showError(msg) {
  const root = document.getElementById('app-root');
  root.innerHTML = `
  <div id="loading-screen">
    <div style="font-size:40px; margin-bottom:16px;">⚠️</div>
    <div class="loading-title">Something went wrong</div>
    <div class="loading-message" style="color:#fca5a5; max-width:360px; line-height:1.6;">${escHtml(msg)}</div>
    <div style="font-size:12px; color:var(--muted); margin:12px 0 20px; max-width:360px; line-height:1.7;">
      Common fixes: make sure your TBA API key is correct, and that the event key is lowercase
      (e.g. <code style="color:var(--gold);">2026mabil</code> not <code style="color:var(--gold);">2026MABIL</code>).
    </div>
    <button class="btn-primary" onclick="S.phase='setup'; render();"
            style="max-width:260px; margin:0 auto;">← Back to Setup</button>
  </div>`;
}

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
loadPersisted();
render();
</script>
</body>
</html>
